stages:
  - test
  - build
  - deploy

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

.npm_ci:
  before_script:
    - npm ci --cache .npm --prefer-offline

storage_lifecycle_tests:
  image: mcr.microsoft.com/playwright:v1.60.0-noble
  stage: test
  extends: .npm_ci
  script:
    - npx playwright install chromium
    - npm run test:e2e:safety
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - playwright-report/
      - test-results/

authenticated_smoke_test:
  image: mcr.microsoft.com/playwright:v1.60.0-noble
  stage: test
  extends: .npm_ci
  script:
    - npx playwright install chromium
    - npm run test:e2e:auth
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - playwright-report/
      - test-results/
  rules:
    - if: '$BUDGETBUDDY_TEST_EMAIL && $BUDGETBUDDY_TEST_PASSWORD'
    - when: never

build_static_assets:
  image: node:24-bookworm-slim
  stage: build
  extends: .npm_ci
  script:
    - npm run build
  artifacts:
    expire_in: 7 days
    paths:
      - dist/

pages:
  image: alpine:3.20
  stage: deploy
  needs:
    - job: build_static_assets
      artifacts: true
  script:
    - rm -rf public
    - mkdir public
    - cp -r dist/. public/
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
